<!DOCTYPE html>
<html>

<head>

<title>Recipe Buddy 🍳</title>

<link rel="stylesheet" href="style.css">

</head>

<script>

if("serviceWorker" in navigator){

navigator.serviceWorker.register(
"service-worker.js"
);

}

</script>
<body>


<nav>

<a href="index.html">🏠 Home</a>
<a href="recipe.html">🍳 Recipes</a>
<a href="grocery.html">🛒 Grocery</a>
<a href="favorites.html">❤️ Favorites</a>
<a href="add-recipe.html">➕ Add Recipe</a>

</nav>



<div class="hero">

<h1>🍳 Recipe Finder</h1>

<p>Find the perfect meal</p>

</div>




<div class="card">


<input 
id="searchBox"
placeholder="Search recipes or ingredients..."
>


<select id="category">

<option value="all">All Categories</option>
<option>Dinner</option>
<option>Dessert</option>
<option>Breakfast</option>
<option>Date Night</option>

</select>



<select id="difficulty">

<option value="all">Any Difficulty</option>
<option>Easy</option>
<option>Medium</option>
<option>Hard</option>

</select>



<button onclick="searchRecipes()">

🔎 Search

</button>


</div>





<div id="results"></div>





<script src="recipes.js"></script>


<script>


let customRecipes =
JSON.parse(
localStorage.getItem("customRecipes")
) || [];



let allRecipes=[
...recipes,
...customRecipes
];







function searchRecipes(){


let word =
document
.getElementById("searchBox")
.value
.toLowerCase();



let category =
document
.getElementById("category")
.value;



let difficulty =
document
.getElementById("difficulty")
.value;



let output="";




allRecipes.forEach(recipe=>{


let ingredients =
recipe.ingredients.join(" ").toLowerCase();



let matchesSearch =

recipe.name.toLowerCase().includes(word)

||

ingredients.includes(word);



let matchesCategory =

category=="all"

||

recipe.category==category;



let matchesDifficulty =

difficulty=="all"

||

recipe.difficulty==difficulty;






if(

matchesSearch

&&

matchesCategory

&&

matchesDifficulty

){



output+=`


<div class="card">


<img 
src="${recipe.image}"
class="recipe-image"
>



<h2>
${recipe.name}
</h2>



<p>
🍽 ${recipe.category}
</p>


<p>
⏱ ${recipe.time}
</p>


<p>
⭐ ${recipe.difficulty}
</p>



<h3>Ingredients</h3>


<ul>

${recipe.ingredients.map(item=>

`<li>${item}</li>`

).join("")}

</ul>



<h3>Instructions</h3>


<p>
${recipe.instructions}
</p>



</div>


`;



}



});



document.getElementById("results").innerHTML =

output || "<h2>No recipes found 😢</h2>";



}



</script>



</body>

</html>
