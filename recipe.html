<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    >

    <title>Recipes 🍳</title>

    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon.png">

    <meta name="theme-color" content="#8e44ad">

    <meta
        name="mobile-web-app-capable"
        content="yes"
    >

    <meta
        name="apple-mobile-web-app-capable"
        content="yes"
    >

    <meta
        name="apple-mobile-web-app-status-bar-style"
        content="black-translucent"
    >

    <meta
        name="apple-mobile-web-app-title"
        content="Recipe Buddy"
    >
</head>

<body>

<nav>
    <a href="index.html">🏠 Home</a>
    <a href="recipe.html">🍳 Recipes</a>
    <a href="gallery.html">📸 Gallery</a>
    <a href="grocery.html">🛒 Grocery</a>
    <a href="favorites.html">❤️ Favorites</a>
    <a href="add-recipe.html">➕ Add Recipe</a>
</nav>

<header class="hero">

    <h1>🍳 Recipe Finder</h1>

    <p>
        Search your recipes, then tap one to see the full instructions.
    </p>

</header>

<main>

    <section class="card">

        <label for="searchBox">
            <strong>Search recipes</strong>
        </label>

        <input
            id="searchBox"
            type="search"
            placeholder="Search chicken, pasta, dessert, easy..."
        >

        <br><br>

        <label for="categoryFilter">
            <strong>Category</strong>
        </label>

        <select id="categoryFilter">

            <option value="all">
                All categories
            </option>

            <option value="Breakfast">
                Breakfast
            </option>

            <option value="Lunch">
                Lunch
            </option>

            <option value="Dinner">
                Dinner
            </option>

            <option value="Dessert">
                Dessert
            </option>

            <option value="Date Night">
                Date Night
            </option>

            <option value="Snack">
                Snack
            </option>

            <option value="Drink">
                Drink
            </option>

            <option value="Other">
                Other
            </option>

        </select>

        <br><br>

        <label for="difficultyFilter">
            <strong>Difficulty</strong>
        </label>

        <select id="difficultyFilter">

            <option value="all">
                Any difficulty
            </option>

            <option value="Easy">
                Easy
            </option>

            <option value="Medium">
                Medium
            </option>

            <option value="Hard">
                Hard
            </option>

            <option value="Custom">
                Custom
            </option>

        </select>

        <br><br>

        <label for="sortFilter">
            <strong>Sort recipes</strong>
        </label>

        <select id="sortFilter">

            <option value="default">
                Default order
            </option>

            <option value="az">
                Name: A–Z
            </option>

            <option value="za">
                Name: Z–A
            </option>

            <option value="category">
                Category
            </option>

        </select>

        <p
            id="resultCount"
            style="text-align:center; font-weight:bold;"
        ></p>

    </section>

    <section
        id="results"
        style="
            width:min(1100px, 100%);
            margin:20px auto;
            display:grid;
            grid-template-columns:
                repeat(auto-fit, minmax(250px, 1fr));
            gap:18px;
        "
    ></section>

</main>

<div class="mobile-nav">

    <a href="index.html">
        🏠
        <span>Home</span>
    </a>

    <a href="recipe.html">
        🍳
        <span>Recipes</span>
    </a>

    <a href="add-recipe.html">
        ➕
        <span>Add</span>
    </a>

    <a href="grocery.html">
        🛒
        <span>Grocery</span>
    </a>

    <a href="favorites.html">
        ❤️
        <span>Favorites</span>
    </a>

</div>

<script src="recipes.js"></script>

<script>
    const builtInRecipes =
        typeof recipes !== "undefined"
            ? recipes.map(function (recipe) {
                return {
                    ...recipe,
                    isCustom: false
                };
            })
            : [];

    const customRecipes =
        (
            JSON.parse(
                localStorage.getItem("customRecipes")
            ) || []
        ).map(function (recipe) {
            return {
                ...recipe,
                isCustom: true
            };
        });

    const allRecipes = [
        ...builtInRecipes,
        ...customRecipes
    ];

    function escapeHtml(value) {
        return String(value)
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;")
            .replace(/'/g, "&#039;");
    }

    function getRecipeId(recipe, index) {
        return (
            recipe.id ||
            "recipe-" + index
        );
    }

    function getFilteredRecipes() {
        const search =
            document
                .getElementById("searchBox")
                .value
                .toLowerCase()
                .trim();

        const category =
            document
                .getElementById("categoryFilter")
                .value;

        const difficulty =
            document
                .getElementById("difficultyFilter")
                .value;

        const sort =
            document
                .getElementById("sortFilter")
                .value;

        let matchingRecipes =
            allRecipes.filter(function (recipe) {
                const ingredients =
                    Array.isArray(recipe.ingredients)
                        ? recipe.ingredients.join(" ")
                        : "";

                const searchableText = [
                    recipe.name || "",
                    recipe.category || "",
                    recipe.difficulty || "",
                    recipe.notes || "",
                    ingredients
                ]
                    .join(" ")
                    .toLowerCase();

                const matchesSearch =
                    searchableText.includes(search);

                const matchesCategory =
                    category === "all" ||
                    recipe.category === category;

                const matchesDifficulty =
                    difficulty === "all" ||
                    recipe.difficulty === difficulty;

                return (
                    matchesSearch &&
                    matchesCategory &&
                    matchesDifficulty
                );
            });

        if (sort === "az") {
            matchingRecipes.sort(
                function (first, second) {
                    return first.name.localeCompare(
                        second.name
                    );
                }
            );
        }

        if (sort === "za") {
            matchingRecipes.sort(
                function (first, second) {
                    return second.name.localeCompare(
                        first.name
                    );
                }
            );
        }

        if (sort === "category") {
            matchingRecipes.sort(
                function (first, second) {
                    return (
                        String(first.category)
                            .localeCompare(
                                String(second.category)
                            ) ||
                        String(first.name)
                            .localeCompare(
                                String(second.name)
                            )
                    );
                }
            );
        }

        return matchingRecipes;
    }

    function displayRecipes() {
        const matchingRecipes =
            getFilteredRecipes();

        const results =
            document.getElementById("results");

        const resultCount =
            document.getElementById("resultCount");

        resultCount.textContent =
            matchingRecipes.length +
            (
                matchingRecipes.length === 1
                    ? " recipe found"
                    : " recipes found"
            );

        if (matchingRecipes.length === 0) {
            results.innerHTML = `
                <div
                    class="empty-message"
                    style="grid-column:1 / -1;"
                >
                    <h2>No recipes found</h2>

                    <p>
                        Try another recipe name,
                        ingredient, or category.
                    </p>
                </div>
            `;

            return;
        }

        results.innerHTML =
            matchingRecipes
                .map(function (recipe) {
                    const originalIndex =
                        allRecipes.indexOf(recipe);

                    const recipeId =
                        getRecipeId(
                            recipe,
                            originalIndex
                        );

                    return `
                        <article
                            class="card"
                            role="button"
                            tabindex="0"
                            onclick="openRecipe(
                                '${recipeId}'
                            )"
                            onkeydown="
                                if (
                                    event.key === 'Enter' ||
                                    event.key === ' '
                                ) {
                                    openRecipe(
                                        '${recipeId}'
                                    );
                                }
                            "
                            style="
                                width:100%;
                                margin:0;
                                cursor:pointer;
                            "
                        >

                            <img
                                class="recipe-image"
                                src="${
                                    escapeHtml(
                                        recipe.image ||
                                        "food.jpg"
                                    )
                                }"
                                alt="${
                                    escapeHtml(
                                        recipe.name
                                    )
                                }"
                                onerror="
                                    this.src='food.jpg'
                                "
                            >

                            <h2>
                                ${
                                    escapeHtml(
                                        recipe.name
                                    )
                                }
                            </h2>

                            <p>
                                <strong>Category:</strong>
                                ${
                                    escapeHtml(
                                        recipe.category ||
                                        "Other"
                                    )
                                }
                            </p>

                            <p>
                                <strong>Difficulty:</strong>
                                ${
                                    escapeHtml(
                                        recipe.difficulty ||
                                        "Not listed"
                                    )
                                }
                            </p>

                            <p>
                                <strong>Total time:</strong>
                                ${
                                    escapeHtml(
                                        recipe.time ||
                                        recipe.cookTime ||
                                        recipe.prepTime ||
                                        "Not listed"
                                    )
                                }
                            </p>

                            <p>
                                <strong>Servings:</strong>
                                ${
                                    escapeHtml(
                                        recipe.servings ||
                                        "Not listed"
                                    )
                                }
                            </p>

                            <button
                                type="button"
                                onclick="
                                    event.stopPropagation();
                                    openRecipe(
                                        '${recipeId}'
                                    );
                                "
                            >
                                View Recipe & Instructions
                            </button>

                        </article>
                    `;
                })
                .join("");
    }

    function openRecipe(recipeId) {
        localStorage.setItem(
            "selectedRecipeId",
            String(recipeId)
        );

        window.location.href =
            "recipe-details.html";
    }

    const requestedRecipe =
        localStorage.getItem(
            "recipeSearchRequest"
        );

    if (requestedRecipe) {
        document
            .getElementById("searchBox")
            .value =
            requestedRecipe;

        localStorage.removeItem(
            "recipeSearchRequest"
        );
    }

    document
        .getElementById("searchBox")
        .addEventListener(
            "input",
            displayRecipes
        );

    document
        .getElementById("categoryFilter")
        .addEventListener(
            "change",
            displayRecipes
        );

    document
        .getElementById("difficultyFilter")
        .addEventListener(
            "change",
            displayRecipes
        );

    document
        .getElementById("sortFilter")
        .addEventListener(
            "change",
            displayRecipes
        );

    displayRecipes();
</script>

<script src="update-app.js"></script>

</body>

</html>
