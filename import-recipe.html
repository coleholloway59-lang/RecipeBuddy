<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    >

    <title>Import Recipe 📲</title>

    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon.png">

    <meta name="theme-color" content="#8e44ad">

    <meta
        name="apple-mobile-web-app-capable"
        content="yes"
    >

    <meta
        name="apple-mobile-web-app-status-bar-style"
        content="black-translucent"
    >

    <meta
        name="apple-mobile-web-app-title"
        content="Recipe Buddy"
    >
</head>

<body>

<nav>
    <a href="index.html">🏠 Home</a>
    <a href="recipe.html">🍳 Recipes</a>
    <a href="gallery.html">📸 Gallery</a>
    <a href="grocery.html">🛒 Grocery</a>
    <a href="favorites.html">❤️ Favorites</a>
    <a href="add-recipe.html">➕ Add Recipe</a>
    <a href="import-recipe.html">📲 Import</a>
</nav>

<header class="hero">
    <h1>📲 Import a Recipe</h1>

    <p>
        Save recipes you find on Instagram, TikTok,
        YouTube, or cooking websites.
    </p>
</header>

<main>

    <section class="card">

        <label for="sourceLink">
            <strong>Recipe link</strong>
        </label>

        <input
            id="sourceLink"
            type="url"
            placeholder="Paste the Instagram, TikTok, YouTube, or website link"
        >

        <br><br>

        <label for="recipeName">
            <strong>Recipe name</strong>
        </label>

        <input
            id="recipeName"
            type="text"
            placeholder="Example: Creamy Garlic Chicken"
        >

        <br><br>

        <label for="creatorName">
            <strong>Creator or account name</strong>
        </label>

        <input
            id="creatorName"
            type="text"
            placeholder="Example: @cookingwithsam"
        >

        <br><br>

        <label for="platform">
            <strong>Where did you find it?</strong>
        </label>

        <select id="platform">
            <option value="Instagram">Instagram</option>
            <option value="TikTok">TikTok</option>
            <option value="YouTube">YouTube</option>
            <option value="Website">Website</option>
            <option value="Other">Other</option>
        </select>

        <br><br>

        <label for="category">
            <strong>Category</strong>
        </label>

        <select id="category">
            <option value="Breakfast">Breakfast</option>
            <option value="Lunch">Lunch</option>
            <option value="Dinner">Dinner</option>
            <option value="Dessert">Dessert</option>
            <option value="Date Night">Date Night</option>
            <option value="Snack">Snack</option>
            <option value="Drink">Drink</option>
            <option value="Other">Other</option>
        </select>

        <br><br>

        <label for="difficulty">
            <strong>Difficulty</strong>
        </label>

        <select id="difficulty">
            <option value="Easy">Easy</option>
            <option value="Medium">Medium</option>
            <option value="Hard">Hard</option>
        </select>

        <br><br>

        <label for="servings">
            <strong>Servings</strong>
        </label>

        <input
            id="servings"
            type="number"
            min="1"
            value="2"
        >

        <br><br>

        <label for="prepTime">
            <strong>Prep time</strong>
        </label>

        <input
            id="prepTime"
            type="text"
            placeholder="Example: 15 minutes"
        >

        <br><br>

        <label for="cookTime">
            <strong>Cook time</strong>
        </label>

        <input
            id="cookTime"
            type="text"
            placeholder="Example: 30 minutes"
        >

        <br><br>

        <label for="imageLink">
            <strong>Image link</strong>
        </label>

        <input
            id="imageLink"
            type="url"
            placeholder="Optional image URL"
        >

        <br><br>

        <label for="ingredients">
            <strong>Ingredients</strong>
        </label>

        <textarea
            id="ingredients"
            placeholder="Enter one ingredient per line"
        ></textarea>

        <br><br>

        <label for="instructions">
            <strong>Instructions</strong>
        </label>

        <textarea
            id="instructions"
            placeholder="Enter one cooking step per line"
        ></textarea>

        <br><br>

        <label for="notes">
            <strong>Personal notes</strong>
        </label>

        <textarea
            id="notes"
            placeholder="Example: Try this for date night. Add extra cheese."
        ></textarea>

        <br><br>

        <button
            type="button"
            onclick="saveImportedRecipe()"
        >
            📲 Save Imported Recipe
        </button>

        <p
            id="statusMessage"
            style="text-align:center; font-weight:bold;"
        ></p>

    </section>

    <section class="card">

        <h2>Saved Recipe Links</h2>

        <p id="importCount"></p>

        <div id="importedRecipes"></div>

    </section>

</main>

<div class="mobile-nav">

    <a href="index.html">
        🏠
        <span>Home</span>
    </a>

    <a href="recipe.html">
        🍳
        <span>Recipes</span>
    </a>

    <a href="import-recipe.html">
        📲
        <span>Import</span>
    </a>

    <a href="grocery.html">
        🛒
        <span>Grocery</span>
    </a>

    <a href="favorites.html">
        ❤️
        <span>Favorites</span>
    </a>

</div>

<script>
    function cleanLines(value) {
        return value
            .split("\n")
            .map(function (line) {
                return line.trim();
            })
            .filter(function (line) {
                return line.length > 0;
            });
    }

    function getCustomRecipes() {
        return JSON.parse(
            localStorage.getItem("customRecipes")
        ) || [];
    }

    function saveCustomRecipes(recipes) {
        localStorage.setItem(
            "customRecipes",
            JSON.stringify(recipes)
        );
    }

    function escapeHtml(value) {
        return String(value)
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;")
            .replace(/'/g, "&#039;");
    }

    function saveImportedRecipe() {
        const sourceLink =
            document
                .getElementById("sourceLink")
                .value
                .trim();

        const name =
            document
                .getElementById("recipeName")
                .value
                .trim();

        const creator =
            document
                .getElementById("creatorName")
                .value
                .trim();

        const platform =
            document.getElementById("platform").value;

        const category =
            document.getElementById("category").value;

        const difficulty =
            document.getElementById("difficulty").value;

        const servings =
            Number(
                document.getElementById("servings").value
            ) || 1;

        const prepTime =
            document
                .getElementById("prepTime")
                .value
                .trim();

        const cookTime =
            document
                .getElementById("cookTime")
                .value
                .trim();

        const image =
            document
                .getElementById("imageLink")
                .value
                .trim();

        const ingredients =
            cleanLines(
                document.getElementById("ingredients").value
            );

        const instructions =
            cleanLines(
                document.getElementById("instructions").value
            );

        const notes =
            document
                .getElementById("notes")
                .value
                .trim();

        const statusMessage =
            document.getElementById("statusMessage");

        if (!sourceLink) {
            statusMessage.textContent =
                "Please paste the original recipe link.";

            return;
        }

        if (!name) {
            statusMessage.textContent =
                "Please enter the recipe name.";

            return;
        }

        const customRecipes = getCustomRecipes();

        customRecipes.push({
            id: Date.now(),
            name: name,
            category: category,
            difficulty: difficulty,
            servings: servings,
            prepTime: prepTime || "Not listed",
            cookTime: cookTime || "Not listed",
            image: image || "food.jpg",
            source: sourceLink,
            creator: creator,
            platform: platform,
            ingredients: ingredients,
            instructions: instructions,
            notes: notes,
            imported: true,
            createdAt: new Date().toISOString()
        });

        saveCustomRecipes(customRecipes);

        statusMessage.textContent =
            "Imported recipe saved successfully! 📲";

        clearForm();
        displayImportedRecipes();
    }

    function clearForm() {
        document.getElementById("sourceLink").value = "";
        document.getElementById("recipeName").value = "";
        document.getElementById("creatorName").value = "";
        document.getElementById("platform").value =
            "Instagram";
        document.getElementById("category").value =
            "Breakfast";
        document.getElementById("difficulty").value =
            "Easy";
        document.getElementById("servings").value = "2";
        document.getElementById("prepTime").value = "";
        document.getElementById("cookTime").value = "";
        document.getElementById("imageLink").value = "";
        document.getElementById("ingredients").value = "";
        document.getElementById("instructions").value = "";
        document.getElementById("notes").value = "";
    }

    function displayImportedRecipes() {
        const importedRecipes =
            getCustomRecipes().filter(function (recipe) {
                return recipe.imported === true;
            });

        const importCount =
            document.getElementById("importCount");

        const container =
            document.getElementById("importedRecipes");

        importCount.textContent =
            importedRecipes.length +
            (importedRecipes.length === 1
                ? " imported recipe"
                : " imported recipes");

        if (importedRecipes.length === 0) {
            container.innerHTML = `
                <div class="empty-message">
                    <p>
                        You have not imported any recipe links yet.
                    </p>
                </div>
            `;

            return;
        }

        container.innerHTML =
            importedRecipes
                .slice()
                .reverse()
                .map(function (recipe) {
                    return `
                        <article
                            style="
                                padding:16px 0;
                                border-bottom:1px solid #ead5e5;
                            "
                        >
                            <h3>
                                ${escapeHtml(recipe.name)}
                            </h3>

                            <p>
                                <strong>Platform:</strong>
                                ${escapeHtml(recipe.platform)}
                            </p>

                            ${
                                recipe.creator
                                    ? `
                                        <p>
                                            <strong>Creator:</strong>
                                            ${escapeHtml(recipe.creator)}
                                        </p>
                                    `
                                    : ""
                            }

                            <a
                                href="${recipe.source}"
                                target="_blank"
                                rel="noopener noreferrer"
                            >
                                <button type="button">
                                    Open Original Post
                                </button>
                            </a>

                            <br><br>

                            <button
                                type="button"
                                onclick="deleteImportedRecipe(${recipe.id})"
                            >
                                🗑️ Delete Imported Recipe
                            </button>
                        </article>
                    `;
                })
                .join("");
    }

    function deleteImportedRecipe(id) {
        const shouldDelete =
            confirm(
                "Are you sure you want to delete this imported recipe?"
            );

        if (!shouldDelete) {
            return;
        }

        const updatedRecipes =
            getCustomRecipes().filter(function (recipe) {
                return recipe.id !== id;
            });

        saveCustomRecipes(updatedRecipes);

        displayImportedRecipes();
    }

    displayImportedRecipes();
</script>

<script src="update-app.js"></script>

</body>

</html>
