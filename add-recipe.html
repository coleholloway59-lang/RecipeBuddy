<body>

<nav>
    <a href="index.html">🏠 Home</a>

</nav>

<header class="hero">
    <h1>➕ Add a Recipe</h1>

    <p>
        Save your own detailed recipe.
    </p>
</header>

<main>

    <section class="card">

        <label for="name">
            <strong>Recipe name</strong>
        </label>

        <input
            id="name"
            type="text"
            placeholder="Example: Creamy Chicken Alfredo"
        >

        <br><br>

        <label for="category">
            <strong>Category</strong>
        </label>

        <select id="category">
            <option value="">Choose a category</option>
            <option value="Breakfast">Breakfast</option>
            <option value="Lunch">Lunch</option>
            <option value="Dinner">Dinner</option>
            <option value="Dessert">Dessert</option>
            <option value="Date Night">Date Night</option>
            <option value="Snack">Snack</option>
            <option value="Drink">Drink</option>
            <option value="Other">Other</option>
        </select>

        <br><br>

        <label for="difficulty">
            <strong>Difficulty</strong>
        </label>

        <select id="difficulty">
            <option value="Easy">Easy</option>
            <option value="Medium">Medium</option>
            <option value="Hard">Hard</option>
        </select>

        <br><br>

        <label for="servings">
            <strong>Servings</strong>
        </label>

        <input
            id="servings"
            type="number"
            min="1"
            value="2"
        >

        <br><br>

        <label for="prepTime">
            <strong>Prep time</strong>
        </label>

        <input
            id="prepTime"
            type="text"
            placeholder="Example: 15 minutes"
        >

        <br><br>

        <label for="cookTime">
            <strong>Cook time</strong>
        </label>

        <input
            id="cookTime"
            type="text"
            placeholder="Example: 30 minutes"
        >

        <br><br>

        <label for="image">
            <strong>Recipe image link</strong>
        </label>

        <input
            id="image"
            type="url"
            placeholder="Paste an image URL or leave blank"
        >

        <br><br>

        <label for="source">
            <strong>Instagram, TikTok, YouTube, or website link</strong>
        </label>

        <input
            id="source"
            type="url"
            placeholder="Paste the original recipe link"
        >

        <br><br>

        <label for="ingredients">
            <strong>Ingredients</strong>
        </label>

        <textarea
            id="ingredients"
            placeholder="Enter one ingredient per line"
        ></textarea>

        <br><br>

        <label for="instructions">
            <strong>Instructions</strong>
        </label>

        <textarea
            id="instructions"
            placeholder="Enter one cooking step per line"
        ></textarea>

        <br><br>

        <label for="notes">
            <strong>Personal notes</strong>
        </label>

        <textarea
            id="notes"
            placeholder="Example: Use extra garlic next time."
        ></textarea>

        <br><br>

        <button
            type="button"
            onclick="saveRecipe()"
        >
            Save Recipe ❤️
        </button>

        <p
            id="statusMessage"
            style="text-align:center; font-weight:bold;"
        ></p>

    </section>

</main>

<div class="mobile-nav">

    <a href="index.html">
        🏠
        <span>Home</span>

    </a>

</div>

<script>
    function cleanLines(value) {
        return value
            .split("\n")
            .map(function (line) {
                return line.trim();
            })
            .filter(function (line) {
                return line.length > 0;
            });
    }

    function saveRecipe() {
        const name =
            document.getElementById("name").value.trim();

        const category =
            document.getElementById("category").value;

        const difficulty =
            document.getElementById("difficulty").value;

        const servings =
            Number(document.getElementById("servings").value);

        const prepTime =
            document.getElementById("prepTime").value.trim();

        const cookTime =
            document.getElementById("cookTime").value.trim();

        const image =
            document.getElementById("image").value.trim();

        const source =
            document.getElementById("source").value.trim();

        const ingredients =
            cleanLines(
                document.getElementById("ingredients").value
            );

        const instructions =
            cleanLines(
                document.getElementById("instructions").value
            );

        const notes =
            document.getElementById("notes").value.trim();

        const statusMessage =
            document.getElementById("statusMessage");

        if (!name) {
            statusMessage.textContent =
                "Please enter a recipe name.";
            return;
        }

        if (!category) {
            statusMessage.textContent =
                "Please choose a category.";
            return;
        }

        if (ingredients.length === 0) {
            statusMessage.textContent =
                "Please enter at least one ingredient.";
            return;
        }

        if (instructions.length === 0) {
            statusMessage.textContent =
                "Please enter at least one cooking step.";
            return;
        }

        const customRecipes =
            JSON.parse(
                localStorage.getItem("customRecipes")
            ) || [];

        const recipe = {
            id: Date.now(),
            name: name,
            category: category,
            difficulty: difficulty,
            servings: servings || 1,
            prepTime: prepTime || "Not listed",
            cookTime: cookTime || "Not listed",
            image: image || "food.jpg",
            source: source,
            ingredients: ingredients,
            instructions: instructions,
            notes: notes,
            createdAt: new Date().toISOString()
        };

        customRecipes.push(recipe);

        localStorage.setItem(
            "customRecipes",
            JSON.stringify(customRecipes)
        );

        statusMessage.textContent =
            "Recipe saved successfully! 🍳";

        clearForm();
    }

    function clearForm() {
        document.getElementById("name").value = "";
        document.getElementById("category").value = "";
        document.getElementById("difficulty").value = "Easy";
        document.getElementById("servings").value = "2";
        document.getElementById("prepTime").value = "";
        document.getElementById("cookTime").value = "";
        document.getElementById("image").value = "";
        document.getElementById("source").value = "";
        document.getElementById("ingredients").value = "";
        document.getElementById("instructions").value = "";
        document.getElementById("notes").value = "";
    }
</script>

<script src="update-app.js"></script>

</body>

</html>
