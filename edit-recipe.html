<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0, viewport-fit=cover"
>

<title>Edit Recipe ✏️</title>

<link rel="stylesheet" href="style.css">

<link rel="manifest" href="manifest.json">

<link rel="apple-touch-icon" href="icon.png">

<meta name="theme-color" content="#8e44ad">

</head>

<body>

<nav>

<a href="index.html">🏠 Home</a>

<a href="recipe.html">🍳 Recipes</a>

<a href="gallery.html">📸 Gallery</a>

<a href="favorites.html">❤️ Favorites</a>

<a href="grocery.html">🛒 Grocery</a>

</nav>

<header class="hero">

<h1>✏️ Edit Recipe</h1>

<p>

Update your recipe without deleting it.

</p>

</header>

<main>

<section class="card">

<h2 id="recipeTitle">

Loading recipe...

</h2>

<form id="editForm">

<label>Recipe Name</label>

<input
type="text"
id="name"
>

<br><br>

<label>Category</label>

<select id="category">

<option>Breakfast</option>

<option>Lunch</option>

<option>Dinner</option>

<option>Dessert</option>

<option>Date Night</option>

<option>Snack</option>

<option>Drink</option>

<option>Other</option>

</select>

<br><br>

<label>Difficulty</label>

<select id="difficulty">

<option>Easy</option>

<option>Medium</option>

<option>Hard</option>

</select>

<br><br>

<label>Servings</label>

<input
type="number"
id="servings"
min="1"
>

<br><br>

<label>Prep Time</label>

<input
type="text"
id="prepTime"
>

<br><br>

<label>Cook Time</label>

<input
type="text"
id="cookTime"
>

<br><br>

<label>Image URL</label>

<input
type="text"
id="image"
>

<br><br>

<label>Ingredients</label>

<textarea
id="ingredients"
rows="8"
></textarea>

<br><br>

<label>Instructions</label>

<textarea
id="instructions"
rows="12"
></textarea>

<br><br>

<label>Notes</label>

<textarea
id="notes"
rows="6"
></textarea>

<br><br>

<button
type="button"
onclick="saveRecipe()"
>

💾 Save Changes

</button>

</form>

</section>

</main>

<script>

const recipeID =
localStorage.getItem("editingRecipe");

let recipes =
JSON.parse(
localStorage.getItem("customRecipes")
) || [];

const recipe =
recipes.find(r => String(r.id) === recipeID);

if(recipe){

document.getElementById("recipeTitle").textContent =
recipe.name;

document.getElementById("name").value =
recipe.name;

document.getElementById("category").value =
recipe.category;

document.getElementById("difficulty").value =
recipe.difficulty;

document.getElementById("servings").value =
recipe.servings;

document.getElementById("prepTime").value =
recipe.prepTime;

document.getElementById("cookTime").value =
recipe.cookTime;

document.getElementById("image").value =
recipe.image;

document.getElementById("ingredients").value =
recipe.ingredients.join("\n");

document.getElementById("instructions").value =
recipe.instructions.join("\n");

document.getElementById("notes").value =
recipe.notes;

}

function saveRecipe(){

recipe.name =
document.getElementById("name").value;

recipe.category =
document.getElementById("category").value;

recipe.difficulty =
document.getElementById("difficulty").value;

recipe.servings =
document.getElementById("servings").value;

recipe.prepTime =
document.getElementById("prepTime").value;

recipe.cookTime =
document.getElementById("cookTime").value;

recipe.image =
document.getElementById("image").value;

recipe.ingredients =
document.getElementById("ingredients")
.value
.split("\n")
.filter(x=>x);

recipe.instructions =
document.getElementById("instructions")
.value
.split("\n")
.filter(x=>x);

recipe.notes =
document.getElementById("notes").value;

localStorage.setItem(
"customRecipes",
JSON.stringify(recipes)
);

alert("Recipe Updated!");

window.location.href="recipe.html";

}

</script>

</body>

</html>
